<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  height:100vh;
  overflow:hidden;
  color:white;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url('./hadzx.jpg') center/cover no-repeat;
  filter: blur(10px) brightness(0.4);
  z-index:-1;
}

/* CONTAINER */
.container{
  text-align:center;
  padding-top:60px;
}

/* COVER */
.cover{
  width:120px;
  height:120px;
  border-radius:20px;
  object-fit:cover;
}

/* TEXT */
.title{
  margin-top:10px;
  font-size:20px;
  font-weight:bold;
}

.artist{
  opacity:0.7;
  font-size:14px;
}

/* LYRICS */
.lyrics{
  margin-top:20px;
  height:200px;
  overflow:hidden;
  padding:0 20px;
}

.lyrics p{
  opacity:0.4;
  transition:0.3s;
}

.lyrics .active{
  opacity:1;
  color:white;
  font-weight:bold;
}

/* PLAYER */
.controls{
  margin-top:20px;
}

input[type=range]{
  width:80%;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<img src="./cover.png" class="cover">

<div class="title">Music Player</div>
<div class="artist">clone h4dxz</div>

<div class="lyrics" id="lyrics"></div>

<div class="controls">
  <audio id="audio" src="./lagu.mp3"></audio>
  <button onclick="play()">▶</button><br><br>
  <input type="range" id="seek">
</div>

</div>

<script>
const audio = document.getElementById("audio");
const lyricsBox = document.getElementById("lyrics");
const seek = document.getElementById("seek");

let lirik=[];

/* LOAD LRC */
fetch("./lagu.lrc")
.then(res=>res.text())
.then(text=>{
  let lines=text.split("\n");

  lines.forEach(line=>{
    let match=line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
    if(match){
      let time=parseInt(match[1])*60+parseFloat(match[2]);
      let txt=match[3];
      lirik.push({time,txt});
    }
  });

  tampil();
});

/* TAMPIL */
function tampil(){
  lyricsBox.innerHTML="";
  lirik.forEach(l=>{
    let p=document.createElement("p");
    p.innerText=l.txt;
    lyricsBox.appendChild(p);
  });
}

/* SYNC */
audio.ontimeupdate=()=>{
  let current=audio.currentTime;
  let items=lyricsBox.querySelectorAll("p");

  lirik.forEach((l,i)=>{
    if(current>=l.time){
      items.forEach(e=>e.classList.remove("active"));
      if(items[i]){
        items[i].classList.add("active");

        lyricsBox.scrollTop = items[i].offsetTop - 80;
      }
    }
  });

  if(audio.duration){
    seek.value=(current/audio.duration)*100;
  }
};

/* SEEK */
seek.oninput=()=>{
  if(audio.duration){
    audio.currentTime=(seek.value/100)*audio.duration;
  }
};

/* PLAY */
function play(){
  if(audio.paused) audio.play();
  else audio.pause();
}
</script>

</body>
</html>
