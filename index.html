<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: url('bg.jpg') center/cover no-repeat;
  overflow: hidden;
}

.overlay {
  backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.4);
  height: 100vh;
  width: 100%;
  position: absolute;
}

.container {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

.cover {
  width: 120px;
  height: 120px;
  border-radius: 20px;
  object-fit: cover;
  margin-bottom: 15px;
}

.title {
  font-size: 20px;
  font-weight: bold;
}

.artist {
  opacity: 0.7;
  margin-bottom: 20px;
}

.lyrics {
  max-width: 80%;
  height: 180px;
  overflow: hidden;
  position: relative;
}

.line {
  opacity: 0.4;
  transition: 0.3s;
  font-size: 14px;
  margin: 6px 0;
}

.active {
  opacity: 1;
  font-size: 16px;
  font-weight: bold;
}

.controls {
  position: absolute;
  bottom: 80px; /* NAIKIN DIKIT */
  width: 80%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

button {
  margin-bottom: 10px;
  border: none;
  background: white;
  border-radius: 50%;
  width: 45px;
  height: 45px;
}

input[type=range] {
  width: 100%;
}

.footer {
  position: absolute;
  bottom: 20px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<img src="cover.jpg" class="cover">

<div class="title">Sedia Aku Sebelum Hujan</div>
<div class="artist">Ebiet G. Ade</div>

<div class="lyrics" id="lyrics">
  <div class="line">Tapi ku penuh saat kau teduh</div>
  <div class="line">Sudah paham kan sejauh ini?</div>
  <div class="line">Ku yang lama di sini</div>
  <div class="line active">Menjagamu tak patah hati</div>
  <div class="line">Sedia aku sebelum hujan</div>
</div>

<div class="controls">
  <button id="play">▶</button>
  <input type="range" id="progress" value="0">
</div>

<div class="footer">made with h4dzx & jejey</div>

</div>

<audio id="audio" src="music.mp3"></audio>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("play");
const progress = document.getElementById("progress");
const lines = document.querySelectorAll(".line");

playBtn.onclick = () => {
  if(audio.paused){
    audio.play();
    playBtn.innerText = "⏸";
  } else {
    audio.pause();
    playBtn.innerText = "▶";
  }
};

audio.ontimeupdate = () => {
  progress.value = (audio.currentTime / audio.duration) * 100;

  // SIMPLE highlight pindah
  let index = Math.floor(audio.currentTime / 5);
  lines.forEach(l => l.classList.remove("active"));
  if(lines[index]) lines[index].classList.add("active");
};

progress.oninput = () => {
  audio.currentTime = (progress.value / 100) * audio.duration;
};
</script>

</body>
</html>
