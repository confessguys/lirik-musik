<!DOCTYPE html>
<html>
<head>
  <title>Lirik Lagu</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      /* background merah + gambar */
      background: linear-gradient(rgba(150,0,0,0.7), rgba(150,0,0,0.7)),
                  url('bg.jpg');
      background-size: cover;
      background-position: center;

      color: white;
      font-family: 'Times New Roman', serif;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
      text-shadow: 0 0 15px white;
    }

    .lyrics {
      font-size: 22px;
      min-height: 60px;
      transition: opacity 1s ease;
      opacity: 0;
    }

    audio {
      margin-top: 30px;
    }
  </style>
</head>

<body>

<h1>LIRIK LAGU</h1>

<div id="lyrics" class="lyrics"></div>

<audio id="audio" controls>
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<script>
const lyrics = [
  { text: "Sayang dengarlah bisikkan hatiku", time: 0 },
  { text: "Karena ku sayang kamu, hoooo", time: 5 },
  { text: "Sayang apa kabar denganmu", time: 10 },
  { text: "Disini ku merindukanmu", time: 14 },
  { text: "Ku harap kau baik di sana", time: 18 }
];

const audio = document.getElementById("audio");
const display = document.getElementById("lyrics");

audio.ontimeupdate = () => {
  let current = audio.currentTime;

  for (let i = 0; i < lyrics.length; i++) {
    if (current >= lyrics[i].time && 
       (i === lyrics.length - 1 || current < lyrics[i+1].time)) {
      
      if (display.innerText !== lyrics[i].text) {
        display.style.opacity = 0;

        setTimeout(() => {
          display.innerText = lyrics[i].text;
          display.style.opacity = 1;
        }, 300);
      }
    }
  }
};
</script>

</body>
</html>
