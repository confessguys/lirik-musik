<!DOCTYPE html>
<html>
<head>
  <title>Lirik Lagu</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background: linear-gradient(rgba(150,0,0,0.7), rgba(150,0,0,0.7)),
                  url('bg.jpg');
      background-size: cover;
      background-position: center;
      animation: gerakBG 20s ease-in-out infinite;

      color: white;
      font-family: 'Times New Roman', serif;
      text-align: center;
    }

    @keyframes gerakBG {
      0% { background-position: center top; }
      50% { background-position: center bottom; }
      100% { background-position: center top; }
    }

    h1 {
      font-size: 34px;
      text-shadow: 0 0 10px white;
    }

    #lyrics {
      font-size: 22px;
      min-height: 60px;
      transition: all 0.5s ease;
    }

    .player button {
      margin-top: 20px;
      font-size: 20px;
      padding: 12px 20px;
      border-radius: 30px;
      border: none;
      background: white;
      color: red;
    }

    #progress {
      width: 60%;
    }

    #pojok {
      position: fixed;
      top: 10px;
      left: 15px;
      font-size: 14px;
      opacity: 0.8;
    }

    #sticker {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 80px;
      animation: goyang 2s infinite;
    }

    @keyframes goyang {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(6deg); }
      100% { transform: rotate(0deg); }
    }
  </style>
</head>

<body>

<div id="pojok">lirik lagu cuman 20 detik 🤭</div>

<h1>LIRIK LAGU</h1>
<div id="lyrics">▶ pencet play dulu</div>

<audio id="audio">
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<div class="player">
  <button id="btn">▶</button>
</div>

<!-- PROGRESS BAR -->
<div style="width:80%; margin-top:15px;">
  <span id="current">0:00</span>
  <input type="range" id="progress" value="0" step="1">
  <span id="duration">0:00</span>
</div>

<img src="sticker.png" id="sticker">

<script>
const audio = document.getElementById("audio");
const display = document.getElementById("lyrics");
const btn = document.getElementById("btn");
const progress = document.getElementById("progress");
const current = document.getElementById("current");
const duration = document.getElementById("duration");

let lyrics = [];

/* LOAD LRC */
fetch("lagu.lrc?v=" + new Date().getTime())
  .then(res => res.text())
  .then(data => {
    const lines = data.split("\n");

    lines.forEach(line => {
      let match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
      if (match) {
        let min = parseInt(match[1]);
        let sec = parseFloat(match[2]);

        lyrics.push({
          time: min * 60 + sec,
          text: match[3].trim()
        });
      }
    });
  });

/* PLAY BUTTON */
btn.addEventListener("click", () => {
  if (audio.paused) {
    audio.play();
    btn.innerText = "⏸";
  } else {
    audio.pause();
    btn.innerText = "▶";
  }
});

/* PROGRESS */
audio.addEventListener("loadedmetadata", () => {
  progress.max = Math.floor(audio.duration);
  duration.innerText = formatTime(audio.duration);
});

audio.addEventListener("timeupdate", () => {
  progress.value = Math.floor(audio.currentTime);
  current.innerText = formatTime(audio.currentTime);

  let currentTime = audio.currentTime;

  for (let i = 0; i < lyrics.length; i++) {
    if (
      currentTime >= lyrics[i].time &&
      (i === lyrics.length - 1 || currentTime < lyrics[i + 1].time)
    ) {
      if (display.innerText !== lyrics[i].text) {

        display.style.opacity = 0;
        display.style.transform = "scale(0.8)";

        setTimeout(() => {
          display.innerText = lyrics[i].text;
          display.style.opacity = 1;
          display.style.transform = "scale(1)";
        }, 150);
      }
    }
  }
});

/* DRAG BAR */
progress.addEventListener("input", () => {
  audio.currentTime = progress.value;
});

/* FORMAT TIME */
function formatTime(sec) {
  let m = Math.floor(sec / 60);
  let s = Math.floor(sec % 60);
  return m + ":" + (s < 10 ? "0" + s : s);
}

/* HILANG DI AKHIR */
audio.addEventListener("ended", () => {
  display.style.opacity = 0;
});
</script>

</body>
</html>
