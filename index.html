<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:sans-serif;
  overflow:hidden;
  background:#000; /* fallback biar ga abu */
}

/* ===== BACKGROUND FIX ===== */
.bg{
  position:fixed;
  inset:0;
  background:url('bg.jpg') center/cover no-repeat;
  filter:brightness(0.4);
  z-index:-1;
}

/* ===== LIST ===== */
.list{
  height:100vh;
  padding:20px;
  color:#fff;
}

.header{
  text-align:center;
  margin-bottom:20px;
}

.song{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:12px;
  margin-top:10px;
}

.song img{
  width:50px;
  height:50px;
  border-radius:10px;
}

.info{
  flex:1;
  margin-left:10px;
}

.song button{
  background:#ff9900;
  border:none;
  padding:8px;
  border-radius:8px;
  color:#fff;
}

/* ===== PLAYER ===== */
.player{
  position:absolute;
  inset:0;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#fff;
  text-align:center;
}

.player.active{
  display:flex;
}

/* COVER */
.cover{
  width:130px;
  height:130px;
  border-radius:20px;
  transition:0.5s;
  opacity:0.8;
}

.playing .cover{
  transform:scale(1.1);
  opacity:1;
}

/* TITLE */
.title{
  margin-top:15px;
  font-size:18px;
}

/* LIRIK */
.lyrics{
  margin-top:20px;
  height:120px;
  overflow:hidden;
  font-size:14px;
  opacity:0.7;
}

.lyrics div{
  transition:0.3s;
}

.active{
  color:#fff;
  font-size:16px;
}

/* CONTROL */
.controls{
  margin-top:20px;
}

.controls button{
  background:#fff;
  border:none;
  padding:10px;
  border-radius:50%;
}

/* PROGRESS */
input[type=range]{
  width:80%;
  margin-top:15px;
}

.back{
  position:absolute;
  top:20px;
  left:20px;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- LIST -->
<div class="list" id="list">
  <div class="header">
    <h2>welcome to my music</h2>
    <p>clone h4dxz</p>
  </div>

  <div class="song">
    <img src="cover.png">
    <div class="info">
      <b>Sayang</b><br>
      <small>Shae</small>
    </div>
    <button onclick="play(0)">▶</button>
  </div>

  <div class="song">
    <img src="hujanpict.png">
    <div class="info">
      <b>Sedia Aku Sebelum Hujan</b><br>
      <small>Ebiet G. Ade</small>
    </div>
    <button onclick="play(1)">▶</button>
  </div>
</div>

<!-- PLAYER -->
<div class="player" id="player">
  <button class="back" onclick="back()">⬅</button>

  <img class="cover" id="cover">
  <div class="title" id="title"></div>

  <div class="lyrics" id="lyrics"></div>

  <div class="controls">
    <button onclick="toggle()">⏯</button>
  </div>

  <input type="range" id="progress">
</div>

<audio id="audio"></audio>

<script>
const songs=[
{
  title:"Sayang",
  file:"lagu.mp3",
  cover:"cover.png",
  lrc:"lagu.lrc"
},
{
  title:"Sedia Aku Sebelum Hujan",
  file:"hujan.mp3",
  cover:"hujanpict.png",
  lrc:"hujan.lrc"
}
]

let audio=document.getElementById("audio")
let cover=document.getElementById("cover")
let title=document.getElementById("title")
let progress=document.getElementById("progress")
let lyricsBox=document.getElementById("lyrics")
let player=document.getElementById("player")
let list=document.getElementById("list")

let lrc=[]

function play(i){
  let s=songs[i]

  audio.src=s.file
  cover.src=s.cover
  title.innerText=s.title

  fetch(s.lrc)
  .then(r=>r.text())
  .then(text=>{
    lrc=parse(text)
  })

  list.style.display="none"
  player.classList.add("active")

  audio.play()
}

function toggle(){
  audio.paused ? audio.play() : audio.pause()
}

function back(){
  audio.pause()
  player.classList.remove("active")
  list.style.display="block"
}

/* progress */
audio.ontimeupdate=()=>{
  progress.value=(audio.currentTime/audio.duration)*100
  updateLRC()
}

progress.oninput=()=>{
  audio.currentTime=(progress.value/100)*audio.duration
}

/* parse LRC */
function parse(text){
  return text.split("\n").map(line=>{
    let m=line.match(/\[(\d+):(\d+)\.\d+\](.*)/)
    if(!m)return
    return {
      time:parseInt(m[1])*60+parseInt(m[2]),
      text:m[3]
    }
  }).filter(Boolean)
}

/* update lirik */
function updateLRC(){
  let t=audio.currentTime
  let html=""

  lrc.forEach((l,i)=>{
    let active = t>=l.time && (!lrc[i+1] || t<lrc[i+1].time)
    html+=`<div class="${active?'active':''}">${l.text}</div>`
  })

  lyricsBox.innerHTML=html
}

/* efek play */
audio.onplay=()=>player.classList.add("playing")
audio.onpause=()=>player.classList.remove("playing")
</script>

</body>
</html>
