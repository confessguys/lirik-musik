<!DOCTYPE html>
<html>
<head>
  <title>Lirik Lagu</title>
  <style>
    body {
      background: linear-gradient(to bottom, #ff4d4d, #990000);
      font-family: 'Times New Roman', serif;
      text-align: center;
      color: white;
      padding: 30px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    h1 {
      font-size: 32px;
      text-shadow: 0 0 10px white;
    }

    #lyric {
      font-size: 22px;
      margin-top: 20px;
      min-height: 50px;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    #lyric.show {
      opacity: 1;
    }

    audio {
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <h1>LIRIK LAGU</h1>

  <div id="lyric"></div>

  <audio id="audio" controls autoplay>
    <source src="lagu.mp3" type="audio/mpeg">
  </audio>

  <script>
    const lyrics = [
      { time: 0, text: "Sayang dengarlah bisikkan hatiku" },
      { time: 5, text: "Karena ku sayang kamu, hoooo" },
      { time: 10, text: "Sayang apa kabar denganmu" },
      { time: 15, text: "Disini ku merindukanmu" },
      { time: 20, text: "Ku harap kau baik di sana" }
    ];

    const audio = document.getElementById("audio");
    const lyricDiv = document.getElementById("lyric");
    let currentIndex = -1;

    audio.ontimeupdate = () => {
      let currentTime = audio.currentTime;

      for (let i = 0; i < lyrics.length; i++) {
        if (
          currentTime >= lyrics[i].time &&
          (i === lyrics.length - 1 || currentTime < lyrics[i + 1].time)
        ) {
          if (currentIndex !== i) {
            currentIndex = i;

            lyricDiv.classList.remove("show"); // fade out

            setTimeout(() => {
              lyricDiv.innerText = lyrics[i].text;
              lyricDiv.classList.add("show"); // fade in
            }, 300);
          }
        }
      }
    };
  </script>

</body>
</html>
