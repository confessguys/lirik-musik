<!DOCTYPE html>
<html>
<head>
  <title>Lirik Lagu</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-size: cover;
      background-position: center;
      color: white;
      font-family: 'Times New Roman', serif;
      text-align: center;
      transition: 0.5s;
    }

    #dev {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      opacity: 0;
      animation: devIntro 5s ease forwards;
    }

    @keyframes devIntro {
      0% { opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; }
    }

    #cover {
      width: 140px;
      height: 140px;
      border-radius: 15px;
      margin-bottom: 15px;
      object-fit: cover;
      box-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    #judul {
      font-size: 26px;
      margin: 5px;
    }

    #artist {
      font-size: 14px;
      opacity: 0.8;
    }

    #lyrics-container {
      height: 150px;
      width: 80%;
      overflow: hidden;
      margin-top: 10px;
    }

    #lyrics {
      transition: 0.5s;
    }

    .line {
      opacity: 0.3;
      font-size: 18px;
      margin: 5px 0;
    }

    .active {
      opacity: 1;
      font-size: 24px;
      transform: scale(1.1);
    }

    button {
      margin: 5px;
      padding: 8px 15px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
    }

    #progress {
      width: 70%;
    }
  </style>
</head>

<body>

<div id="dev">developed by r4ul & jena</div>

<img id="cover">

<h1 id="judul"></h1>
<div id="artist"></div>

<div id="lyrics-container">
  <div id="lyrics"></div>
</div>

<audio id="audio"></audio>

<button onclick="togglePlay()">▶ / ⏸</button>
<br>
<input type="range" id="progress">
<br>

<button onclick="loadSong(0)">Lagu 1</button>
<button onclick="loadSong(1)">Lagu 2</button>

<script>
const songs = [
  {
    title: "Sayang",
    artist: "Shae",
    file: "lagu.mp3",
    lrc: "lagu.lrc",
    cover: "cover.png",
    bg: "bg.jpg",
    color: "red"
  },
  {
    title: "Sedia Aku Sebelum Hujan",
    artist: "Ebiet G. Ade",
    file: "hujan.mp3",
    lrc: "hujan.lrc",
    cover: "hujanpict.png",
    bg: "blue.jpg",
    color: "blue"
  }
];

let audio = document.getElementById("audio");
let lyrics = [];
let index = 0;

function loadSong(i){
  let s = songs[i];

  audio.src = s.file;
  document.getElementById("cover").src = s.cover;
  document.getElementById("judul").innerText = s.title;
  document.getElementById("artist").innerText = s.artist;

  document.body.style.background = 
    `linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.8)), url('${s.bg}')`;

  fetch(s.lrc + "?v=" + new Date().getTime())
    .then(r=>r.text())
    .then(data=>{
      lyrics=[];
      data.split("\n").forEach(line=>{
        let m=line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
        if(m){
          lyrics.push({
            time: parseInt(m[1])*60+parseFloat(m[2]),
            text: m[3]
          });
        }
      });
    });
}

function togglePlay(){
  if(audio.paused) audio.play();
  else audio.pause();
}

audio.ontimeupdate = ()=>{
  let t = audio.currentTime;
  document.getElementById("progress").value = t;

  let html="";
  lyrics.forEach((l,i)=>{
    if(t>=l.time && (!lyrics[i+1]||t<lyrics[i+1].time)){
      index=i;
    }
    html+=`<div class="${i==index?'active':'line'}">${l.text}</div>`;
  });
  document.getElementById("lyrics").innerHTML=html;
};

document.getElementById("progress").oninput = (e)=>{
  audio.currentTime = e.target.value;
};

loadSong(0);
</script>

</body>
</html>
