<!DOCTYPE html>
<html>
<head>
  <title>Lirik Lagu</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background: linear-gradient(rgba(150,0,0,0.7), rgba(0,0,0,0.8)),
                  url('bg.jpg');
      background-size: cover;
      background-position: center;
      animation: gerakBG 15s ease-in-out infinite;

      color: white;
      font-family: 'Times New Roman', serif;
      text-align: center;
    }

    @keyframes gerakBG {
      0% { background-position: center top; }
      50% { background-position: center bottom; }
      100% { background-position: center top; }
    }

    #dev {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      opacity: 0.8;
      text-shadow: 0 0 8px white;
      animation: fadeOut 4s ease forwards;
    }

    @keyframes fadeOut {
      0% { opacity: 0; }
      20% { opacity: 1; }
      100% { opacity: 0; }
    }

    #cover {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 15px;
      margin-bottom: 15px;
      box-shadow: 0 0 20px rgba(255,255,255,0.5);
      animation: zoomCover 5s ease-in-out infinite;
    }

    @keyframes zoomCover {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    #judul {
      font-size: 28px;
      text-shadow: 0 0 15px white;
      margin: 5px 0;
    }

    #artist {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 10px;
    }

    #lyrics-container {
      height: 140px;
      width: 80%;
      overflow: hidden;
      position: relative;
      margin-top: 10px;

      mask-image: linear-gradient(to bottom, transparent, white 20%, white 80%, transparent);
    }

    #lyrics {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.5s cubic-bezier(0.22,1,0.36,1);
    }

    .line {
      font-size: 18px;
      opacity: 0.4;
      margin: 5px 0;
      transition: all 0.3s ease;
    }

    .active {
      font-size: 24px;
      opacity: 1;
      transform: scale(1.15);
      text-shadow: 0 0 12px white;
    }

    button {
      margin-top: 20px;
      padding: 10px 25px;
      border-radius: 30px;
      border: none;
      background: white;
      color: red;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255,255,255,0.6);
    }

    #progress {
      width: 70%;
      margin-top: 15px;
    }

    #time {
      font-size: 13px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div id="dev">developed by r4ul & jena</div>

<img id="cover" src="cover.png">

<h1 id="judul">Sayang</h1>
<div id="artist">Shae</div>

<div id="lyrics-container">
  <div id="lyrics"></div>
</div>

<audio id="audio" preload="auto">
  <source src="lagu.mp3">
</audio>

<button id="btn" disabled>Loading...</button>

<input type="range" id="progress">
<div id="time">0:00 / 0:00</div>

<script>
const audio = document.getElementById("audio");
const btn = document.getElementById("btn");
const display = document.getElementById("lyrics");
const progress = document.getElementById("progress");
const time = document.getElementById("time");
const container = document.getElementById("lyrics-container");

let lyrics = [];
let currentIndex = 0;

fetch("lagu.lrc?v=" + new Date().getTime())
  .then(res => res.text())
  .then(data => {
    const lines = data.split("\n");

    lines.forEach(line => {
      let match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
      if (match) {
        lyrics.push({
          time: parseInt(match[1]) * 60 + parseFloat(match[2]),
          text: match[3].trim()
        });
      }
    });

    renderLyrics(0);
  });

audio.addEventListener("canplaythrough", () => {
  btn.disabled = false;
  btn.innerText = "▶";
});

btn.addEventListener("click", () => {
  if (audio.paused) {
    audio.play();
    btn.innerText = "⏸";
  } else {
    audio.pause();
    btn.innerText = "▶";
  }
});

function format(sec){
  let m = Math.floor(sec/60);
  let s = Math.floor(sec%60);
  return m + ":" + (s<10?"0"+s:s);
}

function renderLyrics(activeIndex){
  display.innerHTML = "";

  let activeEl = null;

  lyrics.forEach((line, index) => {
    let div = document.createElement("div");
    div.innerText = line.text;
    div.classList.add("line");

    if(index === activeIndex){
      div.classList.add("active");
      activeEl = div;
    }

    display.appendChild(div);
  });

  if(activeEl){
    const offset = activeEl.offsetTop - container.clientHeight/2 + activeEl.clientHeight/2;
    display.style.transform = `translateY(-${offset}px)`;
  }
}

audio.addEventListener("timeupdate", () => {
  let t = audio.currentTime;

  progress.max = Math.floor(audio.duration);
  progress.value = Math.floor(t);

  time.innerText = format(t) + " / " + format(audio.duration);

  for(let i=0;i<lyrics.length;i++){
    if(t >= lyrics[i].time && (i==lyrics.length-1 || t < lyrics[i+1].time)){
      if(currentIndex !== i){
        currentIndex = i;
        renderLyrics(i);
      }
    }
  }
});

progress.addEventListener("input", ()=>{
  audio.currentTime = progress.value;
});

audio.addEventListener("ended", ()=>{
  btn.innerText = "▶";
});
</script>

</body>
</html>
