<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{color:white;overflow:hidden}

/* BG */
#bg{
  position:fixed;
  inset:0;
  background:url('bg.jpg') center/cover no-repeat;
  filter:blur(25px) brightness(0.4);
  transform:scale(1.2);
  z-index:-1;
  transition:0.5s;
}

/* PAGE */
.page{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.hidden{display:none}

/* MENU */
.menu{padding-top:80px;text-align:center}

.song{
  width:85%;
  display:flex;
  align-items:center;
  gap:10px;
  background:rgba(255,255,255,0.1);
  padding:12px;
  border-radius:15px;
  margin:10px auto;
}

.song img{width:55px;border-radius:10px}

/* PLAYER */
.player{padding-top:60px;text-align:center}

.cover{
  width:140px;
  border-radius:20px;
  margin-bottom:10px;
}

.title{font-size:20px}
.artist{opacity:0.6;margin-bottom:10px}

/* LYRICS (CENTER FIX) */
.lyrics{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  text-align:center;
}

.lyrics p{
  margin:6px 0;
  opacity:0.4;
  font-size:14px;
  transform:scale(0.9);
  transition:0.3s;
}

.lyrics p.active{
  opacity:1;
  font-size:18px;
  font-weight:bold;
  transform:scale(1.1);
}

/* CONTROL (NAIK) */
.controls{
  position:absolute;
  bottom:120px;
  width:80%;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
}

#progress{width:100%}

button{
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:20px;
  margin-bottom:10px;
}

/* BACK */
.back{
  position:absolute;
  top:20px;
  left:20px;
  background:rgba(255,255,255,0.2);
  border:none;
  padding:5px 10px;
  border-radius:10px;
  color:white;
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- MENU -->
<div id="menu" class="page menu">
  <h2>welcome to my music</h2>
  <p>made with h4dzx & jejey</p>

  <div class="song" onclick="playSong('lagu.mp3','Sayang','Shae','cover.png','lagu.lrc')">
    <img src="cover.png">
    <div>Sayang<br><small>Shae</small></div>
  </div>

  <div class="song" onclick="playSong('hujan.mp3','Sedia Aku Sebelum Hujan','Ebiet G. Ade','hujanpict.png','hujan.lrc')">
    <img src="hujanpict.png">
    <div>Sedia Aku Sebelum Hujan<br><small>Ebiet G. Ade</small></div>
  </div>
</div>

<!-- PLAYER -->
<div id="player" class="page player hidden">
  <button class="back" onclick="backMenu()">←</button>

  <img id="cover" class="cover">
  <div id="title" class="title"></div>
  <div id="artist" class="artist"></div>

  <div id="lyrics" class="lyrics"></div>

  <div class="controls">
    <button id="btn" onclick="togglePlay()">▶</button>
    <input type="range" id="progress">
  </div>

  <audio id="audio"></audio>
</div>

<script>
const audio = document.getElementById("audio")
const btn = document.getElementById("btn")
const progress = document.getElementById("progress")
const bg = document.getElementById("bg")
const lyricsDiv = document.getElementById("lyrics")

let lyricsData = []

function playSong(src,title,artist,cover,lrc){
  menu.classList.add("hidden")
  player.classList.remove("hidden")

  audio.src = src
  audio.play()

  titleEl.innerText = title
  artistEl.innerText = artist
  coverEl.src = cover

  // BG IKUT COVER
  bg.style.background = `url('${cover}') center/cover no-repeat`

  loadLRC(lrc)

  btn.innerText="⏸"
}

function loadLRC(file){
  fetch(file)
  .then(r=>r.text())
  .then(text=>{
    lyricsData=[]
    const lines=text.split("\n")

    lines.forEach(line=>{
      const match=line.match(/\[(\d+):(\d+\.\d+)\](.*)/)
      if(match){
        const time=parseInt(match[1])*60+parseFloat(match[2])
        lyricsData.push({time,text:match[3]})
      }
    })
  })
}

audio.ontimeupdate=()=>{
  if(audio.duration){
    progress.value=(audio.currentTime/audio.duration)*100
  }

  updateLyrics()
}

function updateLyrics(){
  const current=audio.currentTime

  lyricsData.forEach((l,i)=>{
    if(current>=l.time){
      lyricsDiv.innerHTML=""

      for(let j=i-3;j<=i+3;j++){
        if(lyricsData[j]){
          const p=document.createElement("p")
          p.innerText=lyricsData[j].text
          if(j===i) p.classList.add("active")
          lyricsDiv.appendChild(p)
        }
      }
    }
  })
}

progress.oninput=()=>{
  if(audio.duration){
    audio.currentTime=(progress.value/100)*audio.duration
  }
}

function togglePlay(){
  audio.paused ? audio.play() : audio.pause()
}

audio.onplay=()=>btn.innerText="⏸"
audio.onpause=()=>btn.innerText="▶"

function backMenu(){
  audio.pause()
  player.classList.add("hidden")
  menu.classList.remove("hidden")

  bg.style.background="url('bg.jpg') center/cover no-repeat"
}

/* shortcut */
const menu=document.getElementById("menu")
const player=document.getElementById("player")
const titleEl=document.getElementById("title")
const artistEl=document.getElementById("artist")
const coverEl=document.getElementById("cover")
</script>

</body>
</html>
