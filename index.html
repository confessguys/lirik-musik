<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
  color:white;
  overflow:hidden;
}

/* BG FIX */
#bg{
  position:fixed;
  inset:0;
  background:url('bg.jpg') center/cover no-repeat;
  filter:blur(25px) brightness(0.4);
  transform:scale(1.2);
  z-index:-1;
}

/* PAGE */
.page{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.hidden{display:none}

/* MENU */
.menu{
  padding-top:80px;
  text-align:center;
}

.song{
  width:85%;
  display:flex;
  align-items:center;
  gap:10px;
  background:rgba(255,255,255,0.1);
  padding:12px;
  border-radius:15px;
  margin:10px auto;
}

.song img{
  width:55px;
  border-radius:10px;
}

/* PLAYER */
.player{
  padding-top:60px;
  text-align:center;
}

.cover{
  width:140px;
  border-radius:20px;
}

/* TEXT */
.title{font-size:20px;margin-top:10px}
.artist{opacity:0.6;margin-bottom:10px}

/* LIRIK */
.lyric{
  margin-top:20px;
  width:80%;
  text-align:center;
  opacity:0.7;
  font-size:14px;
}

/* CONTROL FIX (NAIKIN) */
.controls{
  position:absolute;
  bottom:160px; /* ini dinaikin */
  width:80%;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
}

#progress{
  width:100%;
}

button{
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:20px;
  margin-bottom:10px;
}

/* BACK */
.back{
  position:absolute;
  top:20px;
  left:20px;
  background:rgba(255,255,255,0.2);
  border:none;
  padding:5px 10px;
  border-radius:10px;
  color:white;
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- MENU -->
<div id="menu" class="page menu">
  <h2>welcome to my music</h2>
  <p>made with h4dzx & jejey</p>

  <div class="song" onclick="playSong('lagu.mp3','Sayang','Shae','cover.png')">
    <img src="cover.png">
    <div>Sayang<br><small>Shae</small></div>
  </div>

  <div class="song" onclick="playSong('hujan.mp3','Sedia Aku Sebelum Hujan','Ebiet G. Ade','hujanpict.png')">
    <img src="hujanpict.png">
    <div>Sedia Aku Sebelum Hujan<br><small>Ebiet G. Ade</small></div>
  </div>
</div>

<!-- PLAYER -->
<div id="player" class="page player hidden">
  <button class="back" onclick="backMenu()">←</button>

  <img id="cover" class="cover">
  <div id="title" class="title"></div>
  <div id="artist" class="artist"></div>

  <!-- LIRIK SIMPLE -->
  <div id="lyric" class="lyric">...</div>

  <div class="controls">
    <button id="btn" onclick="togglePlay()">▶</button>
    <input type="range" id="progress">
  </div>

  <audio id="audio"></audio>
</div>

<script>
const audio = document.getElementById("audio")
const btn = document.getElementById("btn")
const progress = document.getElementById("progress")

function playSong(src,title,artist,cover){
  menu.classList.add("hidden")
  player.classList.remove("hidden")

  audio.src = src
  audio.play()

  titleEl.innerText = title
  artistEl.innerText = artist
  coverEl.src = cover

  // lirik dummy dulu
  lyric.innerText = "lagi diputer..."

  btn.innerText = "⏸"
}

function togglePlay(){
  audio.paused ? audio.play() : audio.pause()
}

audio.onplay=()=>btn.innerText="⏸"
audio.onpause=()=>btn.innerText="▶"

audio.ontimeupdate=()=>{
  if(audio.duration){
    progress.value = (audio.currentTime/audio.duration)*100
  }
}

progress.oninput=()=>{
  if(audio.duration){
    audio.currentTime = (progress.value/100)*audio.duration
  }
}

function backMenu(){
  audio.pause()
  player.classList.add("hidden")
  menu.classList.remove("hidden")
}

/* shortcut */
const menu=document.getElementById("menu")
const player=document.getElementById("player")
const titleEl=document.getElementById("title")
const artistEl=document.getElementById("artist")
const coverEl=document.getElementById("cover")
const lyric=document.getElementById("lyric")
</script>

</body>
</html>
