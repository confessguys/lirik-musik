<!DOCTYPE html>
<html>
<head>
  <title>Lirik Lagu</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background: linear-gradient(rgba(150,0,0,0.7), rgba(150,0,0,0.7)),
                  url('bg.jpg');
      background-size: cover;
      background-position: center;
      animation: gerakBG 20s ease-in-out infinite;

      color: white;
      font-family: 'Times New Roman', serif;
      text-align: center;
    }

    @keyframes gerakBG {
      0% { background-position: center top; }
      50% { background-position: center bottom; }
      100% { background-position: center top; }
    }

    #lyrics {
      font-size: 22px;
      min-height: 60px;
      transition: all 0.5s ease;
    }

    button {
      margin-top: 20px;
      font-size: 20px;
      padding: 12px 20px;
      border-radius: 30px;
      border: none;
      background: white;
      color: red;
    }

    #progress {
      width: 60%;
    }

    #time {
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div id="lyrics">⏳ loading dulu...</div>

<audio id="audio" preload="auto">
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<button id="btn" disabled>Loading...</button>

<input type="range" id="progress" value="0">
<div id="time">0:00 / 0:00</div>

<script>
const audio = document.getElementById("audio");
const btn = document.getElementById("btn");
const display = document.getElementById("lyrics");
const progress = document.getElementById("progress");
const time = document.getElementById("time");

let lyrics = [];
let ready = false;

/* LOAD LRC */
fetch("lagu.lrc?v=" + new Date().getTime())
  .then(res => res.text())
  .then(data => {
    const lines = data.split("\n");

    lines.forEach(line => {
      let match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
      if (match) {
        lyrics.push({
          time: parseInt(match[1]) * 60 + parseFloat(match[2]),
          text: match[3].trim()
        });
      }
    });
  });

/* CEK AUDIO SIAP */
audio.addEventListener("canplaythrough", () => {
  ready = true;
  btn.disabled = false;
  btn.innerText = "▶";
  display.innerText = "▶ pencet play";
});

/* PLAY */
btn.addEventListener("click", () => {
  if (!ready) return;

  if (audio.paused) {
    audio.play();
    btn.innerText = "⏸";
  } else {
    audio.pause();
    btn.innerText = "▶";
  }
});

/* FORMAT */
function format(sec){
  let m = Math.floor(sec/60);
  let s = Math.floor(sec%60);
  return m + ":" + (s<10?"0"+s:s);
}

/* UPDATE */
audio.addEventListener("timeupdate", () => {
  let t = audio.currentTime;

  progress.max = Math.floor(audio.duration);
  progress.value = Math.floor(t);

  time.innerText = format(t) + " / " + format(audio.duration);

  for (let i=0;i<lyrics.length;i++){
    if(t >= lyrics[i].time && (i==lyrics.length-1 || t < lyrics[i+1].time)){
      display.innerText = lyrics[i].text;
    }
  }
});

/* DRAG */
progress.addEventListener("input", ()=>{
  audio.currentTime = progress.value;
});

/* ANTI NGULANG */
audio.addEventListener("ended", ()=>{
  btn.innerText = "▶";
});
</script>

</body>
</html>
