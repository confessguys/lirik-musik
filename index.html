<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
  height:100vh;
  color:white;
  overflow:hidden;
}

/* BG DINAMIS */
#bg{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center;
  filter:blur(25px) brightness(0.4);
  transform:scale(1.2);
  z-index:-1;
  transition:0.5s;
}

/* PAGE */
.page{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.hidden{display:none}

/* MENU */
.menu{
  padding-top:80px;
}

.song{
  width:85%;
  display:flex;
  align-items:center;
  gap:10px;
  background:rgba(255,255,255,0.1);
  padding:12px;
  border-radius:15px;
  margin:10px;
}

.song img{
  width:55px;
  border-radius:10px;
}

/* PLAYER */
.player{
  padding-top:70px;
}

.cover{
  width:140px;
  border-radius:20px;
  animation:zoom 6s infinite;
}

@keyframes zoom{
  0%{transform:scale(1)}
  50%{transform:scale(1.05)}
  100%{transform:scale(1)}
}

.title{font-size:20px;margin-top:10px}
.artist{opacity:0.6;margin-bottom:20px}

/* CONTROL */
.controls{
  position:absolute;
  bottom:90px;
  width:80%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#progress{
  width:100%;
}

button{
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:20px;
  margin-bottom:10px;
}

/* BACK */
.back{
  position:absolute;
  top:20px;
  left:20px;
  background:rgba(255,255,255,0.2);
  border:none;
  padding:5px 10px;
  border-radius:10px;
  color:white;
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- MENU -->
<div id="menu" class="page menu">
  <h2>welcome to my music</h2>
  <p>made with h4dzx & jejey</p>

  <div class="song" onclick="playSong('sayang.mp3','Sayang','Shae','cover.jpg')">
    <img src="cover.jpg">
    <div>
      <div>Sayang</div>
      <small>Shae</small>
    </div>
  </div>

  <div class="song" onclick="playSong('hujan.mp3','Sedia Aku Sebelum Hujan','Ebiet G. Ade','cover2.jpg')">
    <img src="cover2.jpg">
    <div>
      <div>Sedia Aku Sebelum Hujan</div>
      <small>Ebiet G. Ade</small>
    </div>
  </div>
</div>

<!-- PLAYER -->
<div id="player" class="page player hidden">
  <button class="back" onclick="backMenu()">←</button>

  <img id="cover" class="cover">
  <div id="title" class="title"></div>
  <div id="artist" class="artist"></div>

  <div class="controls">
    <button id="btn" onclick="togglePlay()">▶</button>
    <input type="range" id="progress">
  </div>

  <audio id="audio"></audio>
</div>

<script>
const audio = document.getElementById("audio")
const btn = document.getElementById("btn")
const progress = document.getElementById("progress")
const bg = document.getElementById("bg")

function playSong(src,title,artist,cover){
  document.getElementById("menu").classList.add("hidden")
  document.getElementById("player").classList.remove("hidden")

  audio.src = src
  audio.play()

  document.getElementById("title").innerText = title
  document.getElementById("artist").innerText = artist
  document.getElementById("cover").src = cover

  bg.style.backgroundImage = `url('${cover}')`

  btn.innerText = "⏸"
}

function togglePlay(){
  if(audio.paused){
    audio.play()
  }else{
    audio.pause()
  }
}

audio.onplay=()=>btn.innerText="⏸"
audio.onpause=()=>btn.innerText="▶"

audio.ontimeupdate=()=>{
  if(audio.duration){
    progress.value = (audio.currentTime/audio.duration)*100
  }
}

progress.oninput=()=>{
  if(audio.duration){
    audio.currentTime = (progress.value/100)*audio.duration
  }
}

function backMenu(){
  audio.pause()
  document.getElementById("player").classList.add("hidden")
  document.getElementById("menu").classList.remove("hidden")
}
</script>

</body>
</html>
