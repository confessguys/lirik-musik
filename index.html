<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  color:white;
  overflow:hidden;
}

#bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url(bg.jpg) center/cover no-repeat;
  filter:blur(20px) brightness(0.5);
  z-index:-1;
  transition:0.5s;
}

.page{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  animation:fade 0.5s;
}

.hide{display:none;}

@keyframes fade{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1}
}

h1{margin-bottom:5px;}
.sub{opacity:0.7;margin-bottom:30px;}

.card{
  width:80%;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:15px;
  border-radius:15px;
  display:flex;
  align-items:center;
  margin:10px 0;
}

.card img{
  width:50px;
  height:50px;
  border-radius:10px;
  margin-right:10px;
}

.cover{
  width:150px;
  border-radius:20px;
  margin-bottom:10px;
}

#lyric{
  height:200px;
  overflow:hidden;
  text-align:center;
  margin-top:20px;
}

.line{
  opacity:0.3;
  transition:0.3s;
  transform:scale(0.95);
}

.active{
  opacity:1;
  font-size:18px;
  transform:scale(1);
}

.controls{
  position:absolute;
  bottom:120px;
  width:80%;
}

input[type=range]{
  width:100%;
}

.playbtn{
  position:absolute;
  bottom:60px;
  background:white;
  color:black;
  border-radius:50%;
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}
.back{
  position:absolute;
  top:20px;
  left:20px;
  background:rgba(255,255,255,0.2);
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- MENU -->
<div id="menu" class="page">
  <h1>welcome to my music</h1>
  <div class="sub">made with h4dzx & jejey</div>

  <div class="card" onclick="playSong(0)">
    <img src="cover.png">
    <div>
      <div>Sayang</div>
      <small>Shae</small>
    </div>
  </div>

  <div class="card" onclick="playSong(1)">
    <img src="hujanpict.png">
    <div>
      <div>Sedia Aku Sebelum Hujan</div>
      <small>Ebiet G. Ade</small>
    </div>
  </div>
</div>

<!-- PLAYER -->
<div id="player" class="page hide">

<div class="back" onclick="back()">←</div>

<img id="cover" class="cover" src="">

<h2 id="title"></h2>
<div id="artist" class="sub"></div>

<div id="lyric"></div>

<div class="controls">
  <input type="range" id="progress" value="0">
</div>

<div class="playbtn" onclick="toggle()">▶</div>

</div>

<audio id="audio"></audio>

<script>
const songs=[
{
  title:"Sayang",
  artist:"Shae",
  src:"lagu.mp3",
  cover:"cover.png",
  lrc:`[00:05]Sayang apa kabar denganmu
[00:10]Di sini ku merindukan kamu
[00:15]Kuharap cintamu takkan berubah`
},
{
  title:"Sedia Aku Sebelum Hujan",
  artist:"Ebiet G. Ade",
  src:"hujan.mp3",
  cover:"hujanpict.png",
  lrc:`[00:05]Tapi ku penuh saat kau teduh
[00:10]Sudah paham kan sejauh ini
[00:15]Ku yang lama di sini`
}
]

let audio=document.getElementById("audio")
let progress=document.getElementById("progress")
let lyricBox=document.getElementById("lyric")

function playSong(i){
  let s=songs[i]

  audio.pause()
  audio.currentTime=0
  audio.src=s.src
  audio.play()

  document.getElementById("title").innerText=s.title
  document.getElementById("artist").innerText=s.artist
  document.getElementById("cover").src=s.cover

  document.getElementById("bg").style.background=`url(${s.cover}) center/cover`

  lyricBox.innerHTML="<div class='line active'>tunggu dulu......</div>"

  setTimeout(()=>{
    loadLrc(s.lrc)
  },1000)

  document.getElementById("menu").classList.add("hide")
  document.getElementById("player").classList.remove("hide")
}

function back(){
  audio.pause()
  document.getElementById("menu").classList.remove("hide")
  document.getElementById("player").classList.add("hide")
}

function toggle(){
  if(audio.paused){
    audio.play()
  }else{
    audio.pause()
  }
}

audio.ontimeupdate=()=>{
  if(!audio.duration) return

  progress.value=(audio.currentTime/audio.duration)*100

  let lines=document.querySelectorAll(".line")
  lines.forEach(l=>l.classList.remove("active"))

  let current=Math.floor(audio.currentTime)
  let el=document.getElementById("l"+current)
  if(el){
    el.classList.add("active")
    el.scrollIntoView({behavior:"smooth",block:"center"})
  }
}

progress.oninput=()=>{
  audio.currentTime=(progress.value/100)*audio.duration
}

function loadLrc(lrc){
  lyricBox.innerHTML=""
  let lines=lrc.split("\n")

  lines.forEach(line=>{
    let match=line.match(/\[(\d+):(\d+)\](.*)/)
    if(match){
      let sec=parseInt(match[1])*60+parseInt(match[2])
      let text=match[3]

      let div=document.createElement("div")
      div.className="line"
      div.id="l"+sec
      div.innerText=text

      lyricBox.appendChild(div)
    }
  })
}
</script>

</body>
</html>
