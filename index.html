<!DOCTYPE html>
<html>
<head>
<title>Music Web</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:'Poppins', sans-serif;
  color:white;
}

/* BACKGROUND */
.bg{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:url('hadxz.jpg') center/cover no-repeat;
  filter:brightness(0.4);
  z-index:-1;
}

/* PAGE */
.page{
  width:100%;
  height:100%;
  position:absolute;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:120px;
  transition:0.5s;
}

/* HEADER */
.header{
  position:absolute;
  top:0;
  width:100%;
  padding:15px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(5px);
  animation:fadeDown 0.8s;
}

/* SONG LIST */
.song{
  width:90%;
  background:rgba(0,0,0,0.7);
  margin:10px;
  padding:12px;
  display:flex;
  align-items:center;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
  animation:fadeUp 0.8s;
}

.song:hover{
  transform:scale(1.03);
}

.song img{
  width:60px;
  height:60px;
  border-radius:10px;
  margin-right:10px;
}

.play{
  margin-left:auto;
  font-size:20px;
}

/* PLAYER */
#player{
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  animation:fadeIn 0.5s;
}

#cover{
  width:150px;
  border-radius:15px;
  margin-bottom:10px;
  box-shadow:0 0 20px rgba(255,255,255,0.4);
  animation:zoom 0.5s;
}

#judul{
  font-size:22px;
}

#artist{
  font-size:14px;
  opacity:0.8;
}

button{
  margin:10px;
  padding:12px;
  border:none;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
  background:white;
}

/* ANIMATIONS */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes fadeDown{
  from{opacity:0; transform:translateY(-20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes zoom{
  from{transform:scale(0.8);}
  to{transform:scale(1);}
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- HOME -->
<div id="home" class="page">

<div class="header">
<h3>welcome to my music</h3>
<p>follow tiktok lu disini</p>
</div>

<div class="song" onclick="openPlayer(0)">
<img src="cover.png">
<div>
<b>Sayang</b><br>
<small>Shae</small>
</div>
<div class="play">▶️</div>
</div>

<div class="song" onclick="openPlayer(1)">
<img src="hujanpict.png">
<div>
<b>Sedia Aku Sebelum Hujan</b><br>
<small>Ebiet G. Ade</small>
</div>
<div class="play">▶️</div>
</div>

</div>

<!-- PLAYER -->
<div id="player" class="page">

<img id="cover">
<h1 id="judul"></h1>
<div id="artist"></div>

<audio id="audio"></audio>

<div>
<button onclick="back()">⬅️</button>
<button onclick="toggle()">⏯️</button>
</div>

</div>

<script>
const songs=[
{
title:"Sayang",
artist:"Shae",
file:"lagu.mp3",
cover:"cover.png"
},
{
title:"Sedia Aku Sebelum Hujan",
artist:"Ebiet G. Ade",
file:"hujan.mp3",
cover:"hujanpict.png"
}
];

let audio=document.getElementById("audio");

function openPlayer(i){
let s=songs[i];

document.getElementById("home").style.display="none";
document.getElementById("player").style.display="flex";

document.getElementById("cover").src=s.cover;
document.getElementById("judul").innerText=s.title;
document.getElementById("artist").innerText=s.artist;

audio.src=s.file;
audio.play();
}

function toggle(){
if(audio.paused) audio.play();
else audio.pause();
}

function back(){
audio.pause();
document.getElementById("player").style.display="none";
document.getElementById("home").style.display="flex";
}
</script>

</body>
</html>
