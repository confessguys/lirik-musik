<!DOCTYPE html>
<html>
<head>
  <title>Lirik Lagu</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background: linear-gradient(rgba(150,0,0,0.7), rgba(150,0,0,0.7)),
                  url('bg.jpg');
      background-size: cover;
      background-position: center;
      animation: gerakBG 30s linear infinite;

      color: white;
      font-family: 'Times New Roman', serif;
      text-align: center;
    }

    @keyframes gerakBG {
      0% { background-position: center 0%; }
      50% { background-position: center 100%; }
      100% { background-position: center 0%; }
    }

    h1 {
      font-size: 38px;
      margin-bottom: 20px;
      text-shadow: 0 0 15px white;
    }

    .lyrics {
      font-size: 22px;
      min-height: 60px;
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.8s ease;
    }

    .player {
      margin-top: 25px;
    }

    .player button {
      font-size: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 30px;
      background: white;
      color: red;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      transition: 0.2s;
    }

    .player button:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<h1>LIRIK LAGU</h1>

<div id="lyrics" class="lyrics"></div>

<audio id="audio">
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<div class="player">
  <button onclick="togglePlay()" id="btn">▶</button>
</div>

<script>
const lyrics = [
  { text: "Sayang dengarlah bisikkan hatiku", time: 0 },
  { text: "Karena ku sayang kamu, hoooo", time: 4 },
  { text: "Sayang apa kabar denganmu", time: 10 },
  { text: "Disini ku merindukanmu", time: 14 },
  { text: "Ku harap kau baik di sana", time: 18 }
];

const audio = document.getElementById("audio");
const display = document.getElementById("lyrics");
const btn = document.getElementById("btn");

function togglePlay() {
  if (audio.paused) {
    audio.play();
    btn.innerText = "⏸";
  } else {
    audio.pause();
    btn.innerText = "▶";
  }
}

audio.addEventListener("timeupdate", () => {
  let current = audio.currentTime;

  for (let i = 0; i < lyrics.length; i++) {
    if (current >= lyrics[i].time &&
       (i === lyrics.length - 1 || current < lyrics[i+1].time)) {

      if (display.innerText !== lyrics[i].text) {

        display.style.opacity = 0;
        display.style.transform = "scale(0.9)";

        setTimeout(() => {
          display.innerText = lyrics[i].text;
          display.style.opacity = 1;
          display.style.transform = "scale(1)";
        }, 300);
      }
    }
  }
});
</script>

</body>
</html>
