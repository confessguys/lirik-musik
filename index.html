<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:sans-serif;
  overflow:hidden;
}

/* LIST PAGE */
.listPage{
  height:100vh;
  background-image:url('./hadzx.jpg'); /* FIX ANTI ABU */
  background-size:cover;
  background-position:center;
  display:flex;
  flex-direction:column;
  padding:20px;
  color:#fff;
}

/* overlay biar dark */
.listPage::before{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
}

/* biar konten di atas overlay */
.listPage *{
  position:relative;
}

.header{
  text-align:center;
  margin-top:10px;
}

.header h2{
  font-size:20px;
}
.header p{
  font-size:12px;
  opacity:0.7;
}

/* LIST LAGU */
.song{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:12px;
  margin-top:15px;
}

.song img{
  width:50px;
  height:50px;
  border-radius:10px;
}

.song .info{
  flex:1;
  margin-left:10px;
}

.song button{
  background:#ff9900;
  border:none;
  padding:8px;
  border-radius:8px;
  color:#fff;
}

/* PLAYER */
.player{
  position:absolute;
  inset:0;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#fff;
  text-align:center;
}

.player.active{
  display:flex;
}

/* BACKGROUND PLAYER */
.player::before{
  content:'';
  position:absolute;
  inset:0;
  background-image:url('./hadzx.jpg'); /* FIX ANTI ABU */
  background-size:cover;
  background-position:center;
  filter:brightness(0.4);
}

/* biar di atas bg */
.player *{
  position:relative;
}

/* COVER */
.cover{
  width:130px;
  height:130px;
  border-radius:20px;
  transition:0.5s;
  opacity:0.8;
}

.playing .cover{
  transform:scale(1.1);
  opacity:1;
}

/* TITLE */
.title{
  margin-top:15px;
  font-size:18px;
}

/* LIRIK */
.lyrics{
  margin-top:20px;
  height:100px;
  overflow:hidden;
  font-size:14px;
  opacity:0.7;
}

.lyrics div{
  transition:0.3s;
}

.activeLine{
  color:#fff;
  font-size:16px;
}

/* CONTROL */
.controls{
  margin-top:20px;
}

.controls button{
  background:#fff;
  border:none;
  padding:10px;
  border-radius:50%;
}

/* PROGRESS */
input[type=range]{
  width:80%;
  margin-top:15px;
}

.back{
  position:absolute;
  top:20px;
  left:20px;
}
</style>
</head>

<body>

<!-- LIST -->
<div class="listPage" id="listPage">
  <div class="header">
    <h2>welcome to my music</h2>
    <p>clone h4dxz</p>
  </div>

  <div class="song">
    <img src="cover.png">
    <div class="info">
      <b>Sayang</b><br>
      <small>Shae</small>
    </div>
    <button onclick="playSong(0)">▶</button>
  </div>

  <div class="song">
    <img src="hujanpict.png">
    <div class="info">
      <b>Sedia Aku Sebelum Hujan</b><br>
      <small>Ebiet G. Ade</small>
    </div>
    <button onclick="playSong(1)">▶</button>
  </div>
</div>

<!-- PLAYER -->
<div class="player" id="player">
  <button class="back" onclick="back()">⬅</button>

  <img class="cover" id="cover">

  <div class="title" id="title"></div>

  <div class="lyrics" id="lyrics"></div>

  <div class="controls">
    <button onclick="toggle()">⏯</button>
  </div>

  <input type="range" id="progress" value="0">
</div>

<audio id="audio"></audio>

<script>
const songs=[
{
  title:"Sayang",
  file:"lagu.mp3",
  cover:"cover.png",
  lrc:"lagu.lrc"
},
{
  title:"Sedia Aku Sebelum Hujan",
  file:"hujan.mp3",
  cover:"hujanpict.png",
  lrc:"hujan.lrc"
}
]

let audio=document.getElementById("audio")
let player=document.getElementById("player")
let list=document.getElementById("listPage")
let cover=document.getElementById("cover")
let title=document.getElementById("title")
let progress=document.getElementById("progress")
let lyricsBox=document.getElementById("lyrics")

let lrc=[]

function playSong(i){
  let s=songs[i]

  audio.src=s.file
  cover.src=s.cover
  title.innerText=s.title

  fetch(s.lrc)
  .then(r=>r.text())
  .then(text=>{
    lrc=parseLRC(text)
  })

  list.style.display="none"
  player.classList.add("active")

  audio.play()
}

function toggle(){
  if(audio.paused){
    audio.play()
  }else{
    audio.pause()
  }
}

function back(){
  audio.pause()
  player.classList.remove("active")
  list.style.display="flex"
}

/* progress */
audio.ontimeupdate=()=>{
  progress.value=(audio.currentTime/audio.duration)*100

  updateLyrics()
}

progress.oninput=()=>{
  audio.currentTime=(progress.value/100)*audio.duration
}

/* LRC PARSER */
function parseLRC(text){
  let lines=text.split("\n")
  return lines.map(l=>{
    let match=l.match(/\[(\d+):(\d+)\.(\d+)\](.*)/)
    if(!match) return null
    return {
      time:parseInt(match[1])*60+parseInt(match[2]),
      text:match[4]
    }
  }).filter(Boolean)
}

/* UPDATE LIRIK */
function updateLyrics(){
  let t=audio.currentTime
  let html=""

  lrc.forEach((l,i)=>{
    let active = t>=l.time && (!lrc[i+1] || t<lrc[i+1].time)
    html+=`<div class="${active?'activeLine':''}">${l.text}</div>`
  })

  lyricsBox.innerHTML=html
}
</script>

</body>
</html>
