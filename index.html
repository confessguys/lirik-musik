<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{overflow:hidden;color:white}

/* BG */
#bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url(bg.jpg) center/cover;
  filter:blur(25px) brightness(0.4);
  z-index:-1;
  transition:0.5s;
}

/* PAGE */
.page{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:0.5s;
}

.hide{
  opacity:0;
  pointer-events:none;
}

/* MENU */
.title{font-size:22px}
.subtitle{font-size:12px;opacity:0.6;margin-bottom:20px}

.song{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  margin:10px;
  width:90%;
  background:rgba(255,255,255,0.1);
  border-radius:12px;
  backdrop-filter:blur(10px);
}

.song img{
  width:50px;
  border-radius:10px;
}

/* PLAYER */
.cover{
  width:120px;
  border-radius:20px;
  margin-bottom:10px;
}

.song-title{font-size:18px}
.artist{font-size:12px;opacity:0.7;margin-bottom:10px}

/* LIRIK */
.lyrics{
  height:220px;
  overflow:hidden;
  text-align:center;
  font-size:14px;
}

.line{
  margin:6px 0;
  opacity:0.4;
  transform:scale(0.95);
  transition:0.4s;
}

.active{
  color:white;
  font-size:17px;
  opacity:1;
  transform:scale(1.1);
  text-shadow:0 0 12px rgba(255,255,255,0.8);
}

/* BAR */
.controls{
  position:absolute;
  bottom:180px;
  width:80%;
}

input[type=range]{width:100%}

/* PLAY */
.playbtn{
  position:absolute;
  bottom:100px;
  width:65px;
  height:65px;
  border-radius:50%;
  border:none;
  font-size:22px;
  transition:0.3s;
}

.playbtn:active{transform:scale(0.9)}

/* BACK */
.back{
  position:absolute;
  top:20px;
  left:20px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- MENU -->
<div id="menu" class="page">
  <div class="title">welcome to my music</div>
  <div class="subtitle">made with h4dzx & jejey</div>

  <div class="song" onclick="playSong(0)">
    <img src="cover.png">
    <div>
      <div>Sayang</div>
      <div style="font-size:12px;opacity:0.6;">Shae</div>
    </div>
  </div>

  <div class="song" onclick="playSong(1)">
    <img src="hujanpict.png">
    <div>
      <div>Sedia Aku Sebelum Hujan</div>
      <div style="font-size:12px;opacity:0.6;">Ebiet G. Ade</div>
    </div>
  </div>
</div>

<!-- PLAYER -->
<div id="player" class="page hide">
  <div class="back" onclick="back()">←</div>

  <img id="cover" class="cover">
  <div id="title" class="song-title"></div>
  <div id="artist" class="artist"></div>

  <div id="lyrics" class="lyrics"></div>

  <div class="controls">
    <input type="range" id="progress" value="0">
  </div>

  <button class="playbtn" onclick="toggle()">▶</button>
</div>

<audio id="audio"></audio>

<script>
let songs=[
  {
    title:"Sayang",
    artist:"Shae",
    src:"lagu.mp3",
    cover:"cover.png",
    lrc:"lagu.lrc"
  },
  {
    title:"Sedia Aku Sebelum Hujan",
    artist:"Ebiet G. Ade",
    src:"hujan.mp3",
    cover:"hujanpict.png",
    lrc:"hujan.lrc"
  }
]

let audio=document.getElementById("audio")
let progress=document.getElementById("progress")
let lyricBox=document.getElementById("lyrics")

function playSong(i){
  let s=songs[i]

  document.getElementById("menu").classList.add("hide")
  document.getElementById("player").classList.remove("hide")

  document.getElementById("title").innerText=s.title
  document.getElementById("artist").innerText=s.artist
  document.getElementById("cover").src=s.cover

  audio.src=s.src
  audio.currentTime=0

  document.querySelector(".playbtn").innerText="⏸"

  audio.play()

  let bg=document.getElementById("bg")
  bg.style.transform="scale(1.1)"
  bg.style.background="url("+s.cover+") center/cover"

  lyricBox.innerHTML="<div style='opacity:0.6'>tunggu dulu...</div>"

  fetch(s.lrc)
  .then(r=>r.text())
  .then(text=>loadLrc(text))
}

function back(){
  audio.pause()

  document.getElementById("menu").classList.remove("hide")
  document.getElementById("player").classList.add("hide")

  let bg=document.getElementById("bg")
  bg.style.transform="scale(1)"
  bg.style.background="url(bg.jpg) center/cover"

  document.querySelector(".playbtn").innerText="▶"
}

function toggle(){
  let btn=document.querySelector(".playbtn")

  if(audio.paused){
    audio.play()
    btn.innerText="⏸"
  }else{
    audio.pause()
    btn.innerText="▶"
  }
}

progress.oninput=()=>{
  audio.currentTime=(progress.value/100)*audio.duration
}

audio.ontimeupdate=()=>{
  if(!audio.duration) return

  progress.value=(audio.currentTime/audio.duration)*100

  let lines=document.querySelectorAll(".line")
  let current=audio.currentTime
  let active=null

  lines.forEach(line=>{
    let time=parseFloat(line.dataset.time)
    if(current>=time){
      active=line
    }
  })

  if(active){
    lines.forEach(l=>l.classList.remove("active"))
    active.classList.add("active")
    active.scrollIntoView({behavior:"smooth",block:"center"})
  }
}

function loadLrc(lrc){
  lyricBox.innerHTML=""

  lrc.split("\n").forEach(line=>{
    let match=line.match(/\[(\d+):(\d+)\](.*)/)
    if(match){
      let time=parseInt(match[1])*60+parseInt(match[2])
      let text=match[3]

      let div=document.createElement("div")
      div.className="line"
      div.dataset.time=time
      div.innerText=text

      lyricBox.appendChild(div)
    }
  })
}
</script>

</body>
</html>
