<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  height: 100vh;
  background: url('bg.jpg') center/cover no-repeat;
  overflow: hidden;
}

/* overlay blur */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.4);
}

/* container */
.player {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

/* cover */
.cover {
  width: 120px;
  height: 120px;
  border-radius: 20px;
  object-fit: cover;
  margin-bottom: 15px;
  animation: zoom 6s ease-in-out infinite;
}

@keyframes zoom {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* title */
.title {
  font-size: 20px;
  font-weight: bold;
}

.artist {
  opacity: 0.7;
  margin-bottom: 20px;
}

/* lyrics */
.lyrics {
  height: 120px;
  overflow: hidden;
  margin-bottom: 20px;
}

.lyrics p {
  opacity: 0.4;
  transition: 0.3s;
}

.lyrics .active {
  opacity: 1;
  color: white;
  font-size: 18px;
  text-shadow: 0 0 10px white;
}

/* controls */
.controls {
  width: 80%;
}

input[type="range"] {
  width: 100%;
}
</style>
</head>

<body>

<div class="player">
  <img src="cover.png" class="cover">

  <div class="title">Sayang</div>
  <div class="artist">Shae</div>

  <div class="lyrics" id="lyrics"></div>

  <div class="controls">
    <audio id="audio" src="lagu.mp3"></audio>
    <input type="range" id="progress" value="0">
  </div>
</div>

<script>
const audio = document.getElementById("audio")
const progress = document.getElementById("progress")
const lyricsBox = document.getElementById("lyrics")

// LRC SAMPLE (lu ganti isi dari file lu juga bisa)
const lrc = `
[00:01.00]Hu-uh-oh
[00:03.00]He-he-yeah
[00:05.00]Sayang, apa kabar denganmu?
[00:08.00]Di sini ku merindukan kamu
[00:12.00]Ku harap cintamu takkan berubah
[00:15.00]Kar'na di sini ku tetap untukmu
`

// parse lrc
let lines = lrc.split("\n").map(line => {
  let match = line.match(/\[(\d+):(\d+).(\d+)\](.*)/)
  if (!match) return null
  return {
    time: parseInt(match[1]) * 60 + parseInt(match[2]),
    text: match[4]
  }
}).filter(x => x)

// render
lines.forEach(l => {
  let p = document.createElement("p")
  p.innerText = l.text
  lyricsBox.appendChild(p)
})

// play
audio.play()

// progress
audio.ontimeupdate = () => {
  progress.value = (audio.currentTime / audio.duration) * 100

  let current = Math.floor(audio.currentTime)

  let index = lines.findIndex((l, i) => {
    return current >= l.time && (!lines[i+1] || current < lines[i+1].time)
  })

  document.querySelectorAll(".lyrics p").forEach(p => p.classList.remove("active"))

  if (index >= 0) {
    let active = lyricsBox.children[index]
    active.classList.add("active")

    lyricsBox.scrollTo({
      top: active.offsetTop - 50,
      behavior: "smooth"
    })
  }
}

// seek
progress.oninput = () => {
  audio.currentTime = (progress.value / 100) * audio.duration
}
</script>

</body>
</html>
