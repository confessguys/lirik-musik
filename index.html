<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Music</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('blue.jpg') no-repeat center/cover;
  overflow:hidden;
  color:white;
}

/* overlay biar gelap */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

/* container */
.container{
  position:relative;
  text-align:center;
  width:90%;
  max-width:350px;
}

/* cover */
.cover{
  width:120px;
  height:120px;
  border-radius:20px;
  margin:auto;
  box-shadow:0 0 25px rgba(255,255,255,0.2);
  transition:.5s;
}

/* animasi */
.playing .cover{
  animation:putar 6s linear infinite;
}
@keyframes putar{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

h2{
  margin-top:15px;
}
p{
  opacity:.7;
}

/* lirik */
.lirik{
  margin-top:20px;
  height:120px;
  overflow:hidden;
  position:relative;
}
.lirik p{
  opacity:.5;
  transition:.3s;
}
.active{
  opacity:1;
  font-size:18px;
  color:white;
}

/* control */
.control{
  margin-top:15px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:white;
}

/* progress */
input[type=range]{
  width:100%;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container" id="player">

  <img id="cover" class="cover" src="cover.png">

  <h2 id="title">Sedia Aku Sebelum Hujan</h2>
  <p id="artist">Ebiet G. Ade</p>

  <div class="lirik" id="lirik"></div>

  <div class="control">
    <button onclick="toggle()">⏯</button>
  </div>

  <input type="range" id="progress" value="0">

  <audio id="audio" src="hujan.mp3"></audio>

</div>

<script>
const audio = document.getElementById("audio")
const progress = document.getElementById("progress")
const lirikBox = document.getElementById("lirik")
const player = document.getElementById("player")

let lirik = []

/* parse lrc */
function parseLRC(text){
  let lines = text.split("\n")
  let result = []

  lines.forEach(line=>{
    let match = line.match(/\[(\d+):(\d+)\.(\d+)\](.*)/)
    if(match){
      let time = parseInt(match[1])*60 + parseInt(match[2])
      result.push({time, text:match[4]})
    }
  })

  return result
}

/* load lrc */
fetch("hujan.lrc")
.then(res=>res.text())
.then(data=>{
  lirik = parseLRC(data)
})

/* play pause */
function toggle(){
  if(audio.paused){
    audio.play()
    player.classList.add("playing")
  }else{
    audio.pause()
    player.classList.remove("playing")
  }
}

/* progress */
audio.addEventListener("timeupdate", ()=>{
  progress.value = (audio.currentTime / audio.duration) * 100

  let current = audio.currentTime
  let html = ""

  for(let i=0;i<lirik.length;i++){
    if(current >= lirik[i].time){
      html = `<p class="active">${lirik[i].text}</p>`
    }
  }

  lirikBox.innerHTML = html
})

/* geser bar */
progress.addEventListener("input", ()=>{
  audio.currentTime = (progress.value/100) * audio.duration
})
</script>

</body>
</html>
