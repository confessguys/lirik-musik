<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
  height:100vh;
  overflow:hidden;
  color:white;
}

/* BG */
#bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url(bg.jpg) center/cover;
  filter:blur(20px) brightness(0.5);
  z-index:-1;
  transition:0.5s;
}

/* PAGE */
.page{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:0.5s;
}

.hide{
  opacity:0;
  pointer-events:none;
}

/* MENU */
.title{
  font-size:22px;
  margin-bottom:5px;
}

.subtitle{
  font-size:12px;
  opacity:0.6;
  margin-bottom:20px;
}

.list{
  width:90%;
}

.song{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  margin:10px 0;
  background:rgba(255,255,255,0.1);
  border-radius:12px;
  backdrop-filter:blur(10px);
  cursor:pointer;
}

.song img{
  width:50px;
  height:50px;
  border-radius:10px;
}

/* PLAYER */
.cover{
  width:120px;
  border-radius:20px;
  margin-bottom:10px;
}

.song-title{
  font-size:18px;
}

.artist{
  font-size:12px;
  opacity:0.7;
  margin-bottom:10px;
}

/* LIRIK */
.lyrics{
  height:200px;
  overflow:hidden;
  text-align:center;
  font-size:14px;
  opacity:0.7;
}

.line{
  margin:5px 0;
  transition:0.3s;
}

.active{
  color:white;
  font-size:16px;
  opacity:1;
}

/* CONTROL */
.controls{
  position:absolute;
  bottom:150px;
  width:80%;
}

input[type=range]{
  width:100%;
}

/* PLAY */
.playbtn{
  position:absolute;
  bottom:80px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:20px;
}

/* BACK */
.back{
  position:absolute;
  top:20px;
  left:20px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div id="bg"></div>

<!-- MENU -->
<div id="menu" class="page">
  <div class="title">welcome to my music</div>
  <div class="subtitle">made with h4dzx & jejey</div>

  <div class="list">
    <div class="song" onclick="playSong(0)">
      <img src="cover.png">
      <div>
        <div>Sayang</div>
        <div style="font-size:12px;opacity:0.6;">Shae</div>
      </div>
    </div>

    <div class="song" onclick="playSong(1)">
      <img src="hujanpict.png">
      <div>
        <div>Sedia Aku Sebelum Hujan</div>
        <div style="font-size:12px;opacity:0.6;">Ebiet G. Ade</div>
      </div>
    </div>
  </div>
</div>

<!-- PLAYER -->
<div id="player" class="page hide">
  <div class="back" onclick="back()">←</div>

  <img id="cover" class="cover">
  <div id="title" class="song-title"></div>
  <div id="artist" class="artist"></div>

  <div id="lyrics" class="lyrics"></div>

  <div class="controls">
    <input type="range" id="progress" value="0">
  </div>

  <button class="playbtn" onclick="toggle()">▶</button>
</div>

<audio id="audio"></audio>

<script>
let songs=[
  {
    title:"Sayang",
    artist:"Shae",
    src:"lagu.mp3",
    cover:"cover.png",
    lrc:"lagu.lrc"
  },
  {
    title:"Sedia Aku Sebelum Hujan",
    artist:"Ebiet G. Ade",
    src:"hujan.mp3",
    cover:"hujanpict.png",
    lrc:"hujan.lrc"
  }
]

let audio=document.getElementById("audio")
let progress=document.getElementById("progress")
let lyricBox=document.getElementById("lyrics")

function playSong(i){
  let s=songs[i]

  document.getElementById("menu").classList.add("hide")
  document.getElementById("player").classList.remove("hide")

  document.getElementById("title").innerText=s.title
  document.getElementById("artist").innerText=s.artist
  document.getElementById("cover").src=s.cover

  audio.src=s.src
  audio.play()

  document.getElementById("bg").style.background=
    "url("+s.cover+") center/cover"

  lyricBox.innerHTML="tunggu dulu..."

  fetch(s.lrc)
  .then(r=>r.text())
  .then(text=>{
    loadLrc(text)
  })
}

function back(){
  audio.pause()
  document.getElementById("menu").classList.remove("hide")
  document.getElementById("player").classList.add("hide")

  document.getElementById("bg").style.background=
    "url(bg.jpg) center/cover"
}

function toggle(){
  if(audio.paused){
    audio.play()
  }else{
    audio.pause()
  }
}

progress.oninput=()=>{
  audio.currentTime=(progress.value/100)*audio.duration
}

audio.ontimeupdate=()=>{
  if(!audio.duration) return

  progress.value=(audio.currentTime/audio.duration)*100

  let lines=document.querySelectorAll(".line")
  let currentTime=audio.currentTime

  let activeLine=null

  lines.forEach(line=>{
    let time=parseFloat(line.dataset.time)
    if(currentTime>=time){
      activeLine=line
    }
  })

  if(activeLine){
    lines.forEach(l=>l.classList.remove("active"))
    activeLine.classList.add("active")
    activeLine.scrollIntoView({behavior:"smooth",block:"center"})
  }
}

function loadLrc(lrc){
  lyricBox.innerHTML=""
  let lines=lrc.split("\n")

  lines.forEach(line=>{
    let match=line.match(/\[(\d+):(\d+)\](.*)/)
    if(match){
      let min=parseInt(match[1])
      let sec=parseInt(match[2])
      let time=min*60+sec
      let text=match[3]

      let div=document.createElement("div")
      div.className="line"
      div.dataset.time=time
      div.innerText=text

      lyricBox.appendChild(div)
    }
  })
}
</script>

</body>
</html>
