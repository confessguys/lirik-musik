<!DOCTYPE html>
<html>
<head>
  <title>Lirik Lagu</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background: linear-gradient(rgba(150,0,0,0.7), rgba(150,0,0,0.7)),
                  url('bg.jpg');
      background-size: cover;
      background-position: center;
      animation: gerakBG 20s ease-in-out infinite;

      color: white;
      font-family: 'Times New Roman', serif;
      text-align: center;
    }

    @keyframes gerakBG {
      0% { background-position: center top; }
      50% { background-position: center bottom; }
      100% { background-position: center top; }
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px white;
    }

    #lyrics {
      font-size: 22px;
      min-height: 60px;
      transition: all 0.8s ease;
      transform: scale(1);
      opacity: 1;
    }

    .player {
      margin-top: 20px;
    }

    .player button {
      font-size: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 30px;
      background: white;
      color: red;
      cursor: pointer;
    }

    #pojok {
      position: fixed;
      top: 10px;
      left: 15px;
      font-size: 14px;
      opacity: 0.8;
      font-style: italic;
    }

    #sticker {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 80px;
      animation: goyang 2s infinite;
    }

    @keyframes goyang {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(6deg); }
      100% { transform: rotate(0deg); }
    }

    /* PROGRESS BAR */
    #progress-container {
      width: 80%;
      height: 8px;
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
      margin-top: 15px;
      overflow: hidden;
      cursor: pointer;
    }

    #progress {
      height: 100%;
      width: 0%;
      background: white;
      transition: width 0.2s;
    }
  </style>
</head>

<body>

<div id="pojok">lirik lagu cuman 20 detik 🤭</div>

<h1>LIRIK LAGU</h1>

<div id="lyrics">▶ pencet play dulu</div>

<audio id="audio">
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<div class="player">
  <button id="btn">▶</button>
</div>

<!-- PROGRESS BAR -->
<div id="progress-container">
  <div id="progress"></div>
</div>

<img src="sticker.png" id="sticker">

<script>
const lyrics = [
  { text: "Sayang apa kabar denganmu", time: 1 },
  { text: "Disini ku merindukan kamu", time: 5 },
  { text: "Ku harap cintamu takkan berubah", time: 9 },
  { text: "Karna disini ku tetap untukmu", time: 13 },

  { text: "Sayang apa kabar denganmu", time: 18 },
  { text: "Cobalah kamu telepon diriku", time: 22 },
  { text: "Ku rindu dengar suara indahmu", time: 26 },
  { text: "Karna dirimulah semangat hidupku", time: 30 },

  { text: "Sayang dengarlah permintaanku", time: 35 },
  { text: "Jangan ragukan cintaku", time: 39 },
  { text: "Sayang percayalah apa kataku", time: 43 },
  { text: "Karna ku sayang kamu", time: 47 },

  { text: "Sayang dengarlah permintaanku", time: 52 },
  { text: "Jaga hatimu untukku", time: 56 },
  { text: "Sayang dengarlah bisikan hatiku", time: 60 },
  { text: "Karna ku sayang kamu", time: 64 }
];

const audio = document.getElementById("audio");
const display = document.getElementById("lyrics");
const btn = document.getElementById("btn");
const progress = document.getElementById("progress");
const container = document.getElementById("progress-container");

/* PLAY BUTTON */
btn.addEventListener("click", () => {
  if (audio.paused) {
    audio.play();
    btn.innerText = "⏸";
  } else {
    audio.pause();
    btn.innerText = "▶";
  }
});

/* SYNC LIRIK */
audio.addEventListener("timeupdate", () => {
  let current = audio.currentTime;

  // progress bar
  let percent = (current / audio.duration) * 100;
  progress.style.width = percent + "%";

  // lirik
  for (let i = 0; i < lyrics.length; i++) {
    if (
      current >= lyrics[i].time &&
      (i === lyrics.length - 1 || current < lyrics[i + 1].time)
    ) {
      if (display.innerText !== lyrics[i].text) {
        display.style.opacity = 0;
        display.style.transform = "scale(0.8)";

        setTimeout(() => {
          display.innerText = lyrics[i].text;
          display.style.opacity = 1;
          display.style.transform = "scale(1)";
        }, 200);
      }
    }
  }
});

/* CLICK PROGRESS */
container.addEventListener("click", (e) => {
  let width = container.clientWidth;
  let clickX = e.offsetX;
  let duration = audio.duration;

  audio.currentTime = (clickX / width) * duration;
});

/* END */
audio.addEventListener("ended", () => {
  display.style.opacity = 0;
});
</script>

</body>
</html>
