<!DOCTYPE html>
<html>
<head>
  <title>Lirik Lagu</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background: linear-gradient(rgba(150,0,0,0.7), rgba(150,0,0,0.7)),
                  url('bg.jpg');
      background-size: cover;
      background-position: center;
      animation: gerakBG 20s ease-in-out infinite;

      color: white;
      font-family: 'Times New Roman', serif;
      text-align: center;
    }

    @keyframes gerakBG {
      0% { background-position: center top; }
      50% { background-position: center bottom; }
      100% { background-position: center top; }
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px white;
    }

    #lyrics {
      font-size: 22px;
      min-height: 60px;
      transition: all 0.8s ease;
      transform: scale(1);
      opacity: 1;
    }

    .player {
      margin-top: 20px;
    }

    .player button {
      font-size: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 30px;
      background: white;
      color: red;
      cursor: pointer;
    }

    #pojok {
      position: fixed;
      top: 10px;
      left: 15px;
      font-size: 14px;
      opacity: 0.8;
      font-style: italic;
    }

    #sticker {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 80px;
      animation: goyang 2s infinite;
    }

    @keyframes goyang {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(6deg); }
      100% { transform: rotate(0deg); }
    }
  </style>
</head>

<body>

<div id="pojok">lirik lagu cuman 20 detik 🤭</div>

<h1>LIRIK LAGU</h1>

<div id="lyrics">▶ pencet play dulu</div>

<audio id="audio">
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<div class="player">
  <button id="btn">▶</button>
</div>

<img src="sticker.png" id="sticker">

<script>
const lyrics = [
  { text: "Sayang dengarlah bisikkan hatiku", time: 0 },
  { text: "Karena ku sayang kamu hoooo", time: 4 },
  { text: "Sayang apa kabar denganmu", time: 9 },
  { text: "Disini ku merindukanmu", time: 13 },
  { text: "Ku harap kau baik di sana", time: 17 },

  { text: "Aku disini menunggumu", time: 22 },
  { text: "Menanti hari kita berjumpa", time: 26 },
  { text: "Tak terasa waktu berlalu", time: 31 },
  { text: "Hati ini semakin rindu", time: 35 },

  { text: "Sayang dengarlah bisikkan hatiku", time: 40 },
  { text: "Karena ku sayang kamu hoooo", time: 44 },
  { text: "Sayang apa kabar denganmu", time: 49 },
  { text: "Disini ku merindukanmu", time: 53 },
  { text: "Ku harap kau baik di sana", time: 57 },

  { text: "Walau jarak memisahkan kita", time: 62 },
  { text: "Cinta ini kan tetap ada", time: 66 },
  { text: "Percayalah padaku sayang", time: 70 },
  { text: "Aku akan selalu setia", time: 74 },

  { text: "Sayang dengarlah bisikkan hatiku", time: 79 },
  { text: "Karena ku sayang kamu hoooo", time: 83 },
  { text: "Sayang apa kabar denganmu", time: 88 },
  { text: "Disini ku merindukanmu", time: 92 },
  { text: "Ku harap kau baik di sana", time: 96 }
];

const audio = document.getElementById("audio");
const display = document.getElementById("lyrics");
const btn = document.getElementById("btn");

btn.addEventListener("click", () => {
  if (audio.paused) {
    audio.play();
    btn.innerText = "⏸";
  } else {
    audio.pause();
    btn.innerText = "▶";
  }
});

audio.addEventListener("timeupdate", () => {
  let current = audio.currentTime;

  for (let i = 0; i < lyrics.length; i++) {
    if (
      current >= lyrics[i].time &&
      (i === lyrics.length - 1 || current < lyrics[i + 1].time)
    ) {
      if (display.innerText !== lyrics[i].text) {

        display.style.opacity = 0;
        display.style.transform = "scale(0.8)";

        setTimeout(() => {
          display.innerText = lyrics[i].text;
          display.style.opacity = 1;
          display.style.transform = "scale(1)";
        }, 200);

      }
    }
  }
});

audio.addEventListener("ended", () => {
  display.style.opacity = 0;
});
</script>

</body>
</html>
