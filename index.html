<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Web</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background:url('hadzx.jpg') center/cover no-repeat;
}

/* DARK OVERLAY */
.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

/* HEADER */
.header{
  position:absolute;
  top:30px;
  width:100%;
  text-align:center;
  color:white;
  z-index:2;
}

/* LIST */
.music-list{
  position:absolute;
  top:120px;
  width:100%;
  padding:0 15px;
  z-index:2;
}

.item{
  display:flex;
  align-items:center;
  background:rgba(0,0,0,0.6);
  margin-bottom:10px;
  padding:10px;
  border-radius:15px;
  backdrop-filter:blur(10px);
}

.item img{
  width:50px;
  height:50px;
  border-radius:10px;
  margin-right:10px;
}

.info{
  flex:1;
  color:white;
}

.play{
  background:orange;
  border:none;
  padding:10px;
  border-radius:10px;
  color:white;
}

/* PLAYER */
.player{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:.4s;
  z-index:3;
}

.player.active{
  left:0;
}

/* COVER */
.cover{
  width:120px;
  border-radius:20px;
  margin-bottom:15px;
}

/* TEXT */
.title{
  color:white;
  font-size:20px;
  font-weight:bold;
}

.artist{
  color:#ccc;
  margin-bottom:20px;
}

/* LIRIK */
.lyric-box{
  height:150px;
  overflow:hidden;
  text-align:center;
}

.lyric{
  transition:.3s;
}

.lyric p{
  color:#aaa;
  margin:5px 0;
}

.active{
  color:white;
  font-size:18px;
}

/* CONTROL */
.controls{
  margin:15px 0;
}

.progress{
  width:80%;
}

.time{
  color:white;
  font-size:12px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="header">
<h2>welcome to my music</h2>
<p>clone h4dxz</p>
</div>

<!-- LIST -->
<div class="music-list" id="list">

<div class="item" onclick="playMusic('hujan.mp3','hujan.lrc','hujanpict.png','Sedia Aku Sebelum Hujan','Ebiet G. Ade')">
<img src="hujanpict.png">
<div class="info">
<p>Sedia Aku Sebelum Hujan</p>
<small>Ebiet G. Ade</small>
</div>
<button class="play">▶</button>
</div>

<div class="item" onclick="playMusic('lagu.mp3','lagu.lrc','cover.png','Sayang','Shae')">
<img src="cover.png">
<div class="info">
<p>Sayang</p>
<small>Shae</small>
</div>
<button class="play">▶</button>
</div>

</div>

<!-- PLAYER -->
<div class="player" id="player">

<button onclick="back()" style="position:absolute;top:20px;left:20px;">⬅</button>

<img id="cover" class="cover">
<div id="title" class="title"></div>
<div id="artist" class="artist"></div>

<div class="lyric-box">
<div id="lyric" class="lyric"></div>
</div>

<div class="controls">
<button onclick="toggle()">⏯</button>
</div>

<input type="range" id="progress" class="progress">

<div id="time" class="time">0:00 / 0:00</div>

</div>

<audio id="audio"></audio>

<script>
let audio = document.getElementById("audio");
let lyricDiv = document.getElementById("lyric");
let progress = document.getElementById("progress");
let time = document.getElementById("time");

let dataLrc=[];

function playMusic(src,lrc,cover,title,artist){
  document.getElementById("player").classList.add("active");
  document.getElementById("list").style.display="none";

  audio.src=src;
  document.getElementById("cover").src=cover;
  document.getElementById("title").innerText=title;
  document.getElementById("artist").innerText=artist;

  fetch(lrc)
  .then(res=>res.text())
  .then(data=>{
    dataLrc=parse(data);
    showLyric();
  });

  audio.play();
}

function parse(data){
  let arr=[];
  data.split("\n").forEach(line=>{
    let m=line.match(/\[(\d+):(\d+)\]/);
    if(m){
      let t=parseInt(m[1])*60+parseInt(m[2]);
      arr.push({time:t,text:line.split("]")[1]});
    }
  });
  return arr;
}

function showLyric(){
  lyricDiv.innerHTML="";
  dataLrc.forEach(l=>{
    let p=document.createElement("p");
    p.innerText=l.text;
    lyricDiv.appendChild(p);
  });
}

audio.ontimeupdate=()=>{
  let c=audio.currentTime;
  let d=audio.duration;

  progress.value=(c/d)*100||0;
  time.innerText=format(c)+" / "+format(d);

  let i=dataLrc.findIndex(x=>c<x.time)-1;
  if(i<0)i=0;

  let all=lyricDiv.querySelectorAll("p");
  all.forEach(e=>e.classList.remove("active"));

  if(all[i]){
    all[i].classList.add("active");
    lyricDiv.style.transform=`translateY(-${i*25}px)`;
  }
}

progress.oninput=()=>{
  audio.currentTime=(progress.value/100)*audio.duration;
}

function format(t){
  let m=Math.floor(t/60);
  let s=Math.floor(t%60);
  if(s<10)s="0"+s;
  return m+":"+s;
}

function toggle(){
  if(audio.paused) audio.play();
  else audio.pause();
}

function back(){
  document.getElementById("player").classList.remove("active");
  document.getElementById("list").style.display="block";
  audio.pause();
}
</script>

</body>
</html>
