<!DOCTYPE html>
<html>
<head>
  <title>Lirik Lagu</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background: linear-gradient(rgba(150,0,0,0.7), rgba(0,0,0,0.7)),
                  url('bg.jpg');
      background-size: cover;
      background-position: center;
      animation: gerakBG 15s ease-in-out infinite;

      color: white;
      font-family: 'Times New Roman', serif;
      text-align: center;
    }

    @keyframes gerakBG {
      0% { background-position: center top; }
      50% { background-position: center bottom; }
      100% { background-position: center top; }
    }

    #judul {
      font-size: 30px;
      text-shadow: 0 0 15px white;
    }

    #artist {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 15px;
    }

    #lyrics-container {
      height: 120px;
      overflow: hidden;
      position: relative;
      mask-image: linear-gradient(to bottom, transparent, white 20%, white 80%, transparent);
    }

    #lyrics {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.4s cubic-bezier(0.25,1,0.5,1);
    }

    .line {
      font-size: 20px;
      opacity: 0.4;
      margin: 6px 0;
      transition: all 0.3s ease;
    }

    .active {
      font-size: 26px;
      opacity: 1;
      transform: scale(1.15);
      text-shadow: 0 0 12px white;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border-radius: 30px;
      border: none;
      background: white;
      color: red;
    }

    #progress {
      width: 70%;
      margin-top: 15px;
    }

    #time {
      font-size: 13px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h1 id="judul">Sayang</h1>
<div id="artist">Shae</div>

<div id="lyrics-container">
  <div id="lyrics"></div>
</div>

<audio id="audio" preload="auto">
  <source src="lagu.mp3">
</audio>

<button id="btn" disabled>Loading...</button>

<input type="range" id="progress">
<div id="time">0:00 / 0:00</div>

<script>
const audio = document.getElementById("audio");
const btn = document.getElementById("btn");
const display = document.getElementById("lyrics");
const progress = document.getElementById("progress");
const time = document.getElementById("time");

let lyrics = [];
let currentIndex = 0;

/* LOAD LRC */
fetch("lagu.lrc?v=" + new Date().getTime())
  .then(res => res.text())
  .then(data => {
    const lines = data.split("\n");

    lines.forEach(line => {
      let match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
      if (match) {
        lyrics.push({
          time: parseInt(match[1]) * 60 + parseFloat(match[2]),
          text: match[3].trim()
        });
      }
    });

    renderLyrics(0);
  });

/* READY */
audio.addEventListener("canplaythrough", () => {
  btn.disabled = false;
  btn.innerText = "▶";
});

/* PLAY */
btn.addEventListener("click", () => {
  if (audio.paused) {
    audio.play();
    btn.innerText = "⏸";
  } else {
    audio.pause();
    btn.innerText = "▶";
  }
});

/* FORMAT */
function format(sec){
  let m = Math.floor(sec/60);
  let s = Math.floor(sec%60);
  return m + ":" + (s<10?"0"+s:s);
}

/* RENDER */
function renderLyrics(activeIndex){
  display.innerHTML = "";

  lyrics.forEach((line, index) => {
    let div = document.createElement("div");
    div.innerText = line.text;
    div.classList.add("line");

    if(index === activeIndex){
      div.classList.add("active");
    }

    display.appendChild(div);
  });

  const containerHeight = 120;
  const lineHeight = 32;

  let offset = activeIndex * lineHeight - (containerHeight / 2 - lineHeight);

  display.style.transform = `translateY(-${offset}px)`;
}

/* UPDATE */
audio.addEventListener("timeupdate", () => {
  let t = audio.currentTime;

  progress.max = Math.floor(audio.duration);
  progress.value = Math.floor(t);

  time.innerText = format(t) + " / " + format(audio.duration);

  for(let i=0;i<lyrics.length;i++){
    if(t >= lyrics[i].time && (i==lyrics.length-1 || t < lyrics[i+1].time)){
      if(currentIndex !== i){
        currentIndex = i;
        renderLyrics(i);
      }
    }
  }
});

/* DRAG */
progress.addEventListener("input", ()=>{
  audio.currentTime = progress.value;
});

/* END */
audio.addEventListener("ended", ()=>{
  btn.innerText = "▶";
});
</script>

</body>
</html>
