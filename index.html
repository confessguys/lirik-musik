<!DOCTYPE html>
<html>
<head>
    <title>Sayang</title>
    <style>
        body {
            background: linear-gradient(to bottom, #ff4d4d, #990000);
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 5px;
        }

        h2 {
            font-size: 22px;
            margin-top: 0;
        }

        .lyrics {
            max-width: 600px;
            margin: auto;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            line-height: 1.7;
        }

        audio {
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1>SAYANG</h1>
    <h2>Dengarlah Bisikan Hatiku</h2>

    <div class="lyrics">
        <p>
        Sayang, dengarlah permintaanku<br>
        Jaga hatimu untukku<br>
        Sayang, dengarlah bisikan hatiku<br>
        Kar'na ku sayang kamu, ah-ah<br><br>

        Sayang, dengarlah permintaanku<br>
        Jangan ragukan cintaku<br>
        Sayang, percayalah apa kataku<br>
        Kar'na ku sayang kamu
        </p>
    </div>

    <audio controls autoplay loop>
        <source src="lagu.mp3" type="audio/mpeg">
    </audio>

</body>
</html>
