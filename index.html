<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body {
  height:100vh;
  background:url('bg.jpg') center/cover no-repeat;
  color:white;
  overflow:hidden;
}

body::before{
  content:"";
  position:absolute;
  inset:0;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.4);
}

/* page */
.page {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:0.4s;
}

.hidden {
  opacity:0;
  pointer-events:none;
}

/* MENU */
.menu h1 {
  margin-bottom:5px;
}
.menu p {
  opacity:0.6;
  margin-bottom:20px;
}

.song {
  width:80%;
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:15px;
  margin:10px;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
}

.song img {
  width:50px;
  height:50px;
  border-radius:10px;
}

.song:hover {
  background:rgba(255,255,255,0.2);
}

/* PLAYER */
.cover {
  width:120px;
  height:120px;
  border-radius:20px;
  object-fit:cover;
  margin-bottom:10px;
  animation:zoom 6s infinite;
}

@keyframes zoom{
  0%{transform:scale(1)}
  50%{transform:scale(1.1)}
  100%{transform:scale(1)}
}

.title {font-size:20px;font-weight:bold;}
.artist {opacity:0.6;margin-bottom:15px;}

.lyrics {
  height:120px;
  overflow:hidden;
  margin-bottom:20px;
  text-align:center;
}

.lyrics p {
  opacity:0.4;
  transition:0.3s;
}

.active {
  opacity:1 !important;
  color:white;
  text-shadow:0 0 10px white;
}

/* controls */
.controls {
  width:80%;
}

.back {
  position:absolute;
  top:20px;
  left:20px;
  background:rgba(0,0,0,0.5);
  padding:5px 10px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="page menu" id="menu">
  <h1>welcome to my music</h1>
  <p>clone h4dxz</p>

  <div class="song" onclick="playSong('lagu.mp3','lagu.lrc','cover.png','Sayang','Shae')">
    <img src="cover.png">
    <div>
      <div>Sayang</div>
      <small>Shae</small>
    </div>
  </div>

  <div class="song" onclick="playSong('hujan.mp3','hujan.lrc','hujanpict.png','Sedia Aku Sebelum Hujan','Ebiet G. Ade')">
    <img src="hujanpict.png">
    <div>
      <div>Sedia Aku Sebelum Hujan</div>
      <small>Ebiet G. Ade</small>
    </div>
  </div>
</div>

<!-- PLAYER -->
<div class="page hidden" id="player">
  <div class="back" onclick="backMenu()">←</div>

  <img id="cover" class="cover">
  <div id="title" class="title"></div>
  <div id="artist" class="artist"></div>

  <div class="lyrics" id="lyrics"></div>

  <div class="controls">
    <audio id="audio"></audio>
    <input type="range" id="progress">
  </div>
</div>

<script>
const menu = document.getElementById("menu")
const player = document.getElementById("player")
const audio = document.getElementById("audio")
const progress = document.getElementById("progress")
const lyricsBox = document.getElementById("lyrics")

let lines = []

function playSong(src,lrcFile,cover,title,artist){
  menu.classList.add("hidden")
  player.classList.remove("hidden")

  audio.src = src
  document.getElementById("cover").src = cover
  document.getElementById("title").innerText = title
  document.getElementById("artist").innerText = artist

  fetch(lrcFile)
  .then(res=>res.text())
  .then(text=>{
    lines = text.split("\n").map(line=>{
      let m = line.match(/\[(\d+):(\d+).(\d+)\](.*)/)
      if(!m)return null
      return {time:parseInt(m[1])*60+parseInt(m[2]),text:m[4]}
    }).filter(x=>x)

    lyricsBox.innerHTML=""
    lines.forEach(l=>{
      let p=document.createElement("p")
      p.innerText=l.text
      lyricsBox.appendChild(p)
    })
  })

  audio.play()
}

audio.ontimeupdate=()=>{
  progress.value=(audio.currentTime/audio.duration)*100
  let t=Math.floor(audio.currentTime)

  let i=lines.findIndex((l,idx)=>
    t>=l.time && (!lines[idx+1]||t<lines[idx+1].time)
  )

  document.querySelectorAll(".lyrics p").forEach(p=>p.classList.remove("active"))

  if(i>=0){
    let el=lyricsBox.children[i]
    el.classList.add("active")

    lyricsBox.scrollTo({
      top:el.offsetTop-50,
      behavior:"smooth"
    })
  }
}

progress.oninput=()=>{
  audio.currentTime=(progress.value/100)*audio.duration
}

function backMenu(){
  audio.pause()
  player.classList.add("hidden")
  menu.classList.remove("hidden")
}
</script>

</body>
</html>
