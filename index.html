<!DOCTYPE html>
<html>
<head>
  <title>Lirik Lagu</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background: linear-gradient(rgba(150,0,0,0.7), rgba(150,0,0,0.7)),
                  url('bg.jpg');
      background-size: cover;
      background-position: center;
      animation: gerakBG 20s ease-in-out infinite;

      color: white;
      font-family: 'Times New Roman', serif;
      text-align: center;
    }

    @keyframes gerakBG {
      0% { background-position: center top; }
      50% { background-position: center bottom; }
      100% { background-position: center top; }
    }

    h1 {
      font-size: 34px;
      text-shadow: 0 0 10px white;
    }

    #lyrics {
      font-size: 22px;
      min-height: 60px;
      transition: all 0.6s ease;
      opacity: 1;
      transform: scale(1);
    }

    .player button {
      margin-top: 20px;
      font-size: 20px;
      padding: 12px 20px;
      border-radius: 30px;
      border: none;
      background: white;
      color: red;
    }

    #pojok {
      position: fixed;
      top: 10px;
      left: 15px;
      font-size: 14px;
      opacity: 0.8;
    }

    #sticker {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 80px;
      animation: goyang 2s infinite;
    }

    @keyframes goyang {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(6deg); }
      100% { transform: rotate(0deg); }
    }
  </style>
</head>

<body>

<div id="pojok">lirik lagu cuman 20 detik 🤭</div>

<h1>LIRIK LAGU</h1>
<div id="lyrics">▶ pencet play dulu</div>

<audio id="audio">
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<div class="player">
  <button id="btn">▶</button>
</div>

<img src="sticker.png" id="sticker">

<script>
const audio = document.getElementById("audio");
const display = document.getElementById("lyrics");
const btn = document.getElementById("btn");

let lyrics = [];

/* LOAD LRC (ANTI CACHE) */
fetch("lagu.lrc?v=" + new Date().getTime())
  .then(res => res.text())
  .then(data => {
    const lines = data.split("\n");

    lines.forEach(line => {
      let match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
      if (match) {
        let min = parseInt(match[1]);
        let sec = parseFloat(match[2]);
        let text = match[3].trim();

        lyrics.push({
          time: min * 60 + sec,
          text: text
        });
      }
    });
  });

/* PLAY BUTTON */
btn.addEventListener("click", () => {
  if (audio.paused) {
    audio.play();
    btn.innerText = "⏸";
  } else {
    audio.pause();
    btn.innerText = "▶";
  }
});

/* SYNC LIRIK FIX */
audio.addEventListener("timeupdate", () => {
  let current = audio.currentTime;

  for (let i = 0; i < lyrics.length; i++) {
    if (
      current >= lyrics[i].time &&
      (i === lyrics.length - 1 || current < lyrics[i + 1].time)
    ) {
      if (display.innerText !== lyrics[i].text) {

        display.style.opacity = 0;
        display.style.transform = "scale(0.8)";

        setTimeout(() => {
          display.innerText = lyrics[i].text;
          display.style.opacity = 1;
          display.style.transform = "scale(1)";
        }, 200);
      }
    }
  }
});

/* HILANG DI AKHIR */
audio.addEventListener("ended", () => {
  display.style.opacity = 0;
});
</script>

</body>
</html>
